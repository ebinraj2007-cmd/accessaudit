# AccessAudit in a container.
#
#   docker compose up --build
#   open http://127.0.0.1:8010
#
# Bound to 127.0.0.1 deliberately. `- "8010:8010"` would publish on 0.0.0.0 and
# often bypass the host firewall — and this application's whole subject is who
# can reach what.

services:
  accessaudit:
    build: .
    image: accessaudit:local
    container_name: accessaudit
    restart: unless-stopped

    ports:
      - "127.0.0.1:8010:8010"

    environment:
      ACCESSAUDIT_TOKEN: "${ACCESSAUDIT_TOKEN:-}"
      ACCESSAUDIT_ORIGINS: "${ACCESSAUDIT_ORIGINS:-http://localhost:8010,http://127.0.0.1:8010}"
      ACCESSAUDIT_LOG_LEVEL: "${ACCESSAUDIT_LOG_LEVEL:-INFO}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

    # Must be /app/data. storage.py computes DB_PATH from __file__ with no
    # environment override, so this is where the code looks. Mounting anywhere
    # else would appear to work and quietly lose the audit trail on redeploy.
    volumes:
      - accessaudit-data:/app/data

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8010/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  accessaudit-data:
